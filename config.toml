baseURL = "https://kyohsuke.github.io/"

languageCode = "ja-jp"
DefaultContentLanguage = "ja"

title = "kyohsuke"
theme = "npq-hugo"
copyright = 'Copyright © Kyohsuke | Powered by Hugo using the npq hugo theme.'
pygmentsUseClasses = true
disableKinds = ["term", "taxonomy", "taxonomyTerm"]
hasCJKLanguage = true
disqusShortname = "kyohsuke"
enableRobotsTXT = true
enableGitInfo = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[frontmatter]
  lastmod = ["lastmod", ":git", "date", "publishDate"]

[outputs]
  home = ['HTML']

[social]
  twitter = 'kyohsuke14'
  twitterid = '1022113389248737283'

[params]
  useAvatar = true
  author = '雪椿'
  displayHomeContent = true
  recentMax = 4
  mainSections = ['tools']
  displayMicroBlog = true
  MicroBlogSection = 'misc_notes'
  locale = "ja_JP"
  googleTagManager = 'GTM-K5XRD2X'

