baseURL = "https://kyohsuke.github.io/"

languageCode = "ja-jp"
DefaultContentLanguage = "ja"

title = "kyohsuke"
theme = "npq-hugo"
copyright = 'Copyright © Kyohsuke | Powered by Hugo using the npq hugo theme.'
pygmentsUseClasses = true
disableKinds = ["taxonomyTerm"]
hasCJKLanguage = true
disqusShortname = "kyohsuke"
enableRobotsTXT = true
enableGitInfo = true

[frontmatter]
  lastmod = ["lastmod", ":git", "date", "publishDate"]

[outputs]
  home = ['HTML']
  page = ['HTML']
  term = ['HTML'] 
  taxonomy = ['HTML'] 
[social]
  twitter = 'kyohsuke14'
  twitterid = '1022113389248737283'

[params]
  useAvatar = true
  author = '雪椿'
  displayHomeContent = true
  recentMax = 4
  mainSections = ['tools']
  displayMicroBlog = true
  MicroBlogSection = 'misc_notes'
  locale = "ja_JP"
  googleTagManager = 'GTM-K5XRD2X'
  listIcons = 3
  [[params.icon]]
    url = 'https://github.com/kyohsuke'
    icon = '<i class="fab fa-github fa-ms"></i>'
  [[params.icon]]
    url = 'https://steamcommunity.com/id/kyohsuke'
    icon = '<i class="fab fa-steam fa-ms"></i>'
  [[params.icon]]
    url = 'https://twitter.com/i/user/1022113389248737283'
    icon = '<i class="fab fa-twitter fa-ms"></i>'
  [[params.icon]]
    url = 'https://amzn.to/2MLEYXX'
    icon = '<i class="fab fa-amazon fa-ms"></i>'
  [[params.icon]]
    url = 'https://bit.ly/kyohsuke_ko-fi'
    icon = '<i class="fas fa-mug-hot"></i>'

[menu]
  [[menu.main]]
    name = 'トップ'
    url = '/'
    pre = '<i class="fas fa-home fa-ms"></i>'
    weight = 10
  [[menu.main]]
    name = '雑記'
    url = '/misc_notes/'
    pre = '<i class="fas fa-book fa-ms"></i>'
    weight = 15
  [[menu.main]]
    name = 'ツール'
    url = '/tools/'
    pre = '<i class="fas fa-tools fa-ms"></i>'
    weight = 20
