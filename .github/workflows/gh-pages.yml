name: github pages

on:
  push:
    branches:
      - hugo

jobs:
  deploy:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: master

      - name: Ping Sitemap
        run: |
          curl --silent https://kyohsuke.github.io/sitemap.xml -o before.xml
          if diff -q public/sitemap.xml before.xml; then
            echo "no sitemap changes."
          else
            echo "sitemap changeed. ping!"
            curl --silent http://www.google.com/ping?sitemap=https://example.com/sitemap.xml -o -
          fi
