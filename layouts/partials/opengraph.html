  <meta property="og:title" content="{{ .Scratch.Get "title" }}" />
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
  <meta property="og:image" content="{{ .Scratch.Get "image" }}" />
  <meta property="og:url" content="{{ .Permalink }}" />
  <meta property="og:description" content="{{ .Scratch.Get "description" }}" />
  <meta property="og:locale" content="{{ .Site.Params.Locale }}" />
  <meta property="og:site_name" content="{{ .Site.Title }}" />
  {{- if .IsPage -}}
    {{- with .Date }}
      <meta property="og:article:published_time" content="{{.Format "2006-01-02"}}" />
    {{end}}
    {{- if ne (.Date.Format "2006-01-02") (.Lastmod.Format "2006-01-02") -}}
      <meta property="og:article:modified_time" content="{{.Lastmod.Format "2006-01-02"}}" />
    {{end}}
  {{- end -}}
