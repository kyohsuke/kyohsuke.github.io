<!doctype html>
<html lang="ja" prefix="og: https://ogp.me/ns#">
  {{ partial "head.html" . -}}
  <body>
    <div style="overflow: hidden;">
      {{- partial "gtm_body" . -}}
      {{- partial "aside.html" . -}}
      <main id="main">
        <a href="javascript:void(0)" id="closebtn" onclick="navToggle()"><i class="fas fa-bars fa-lg"></i></a>
        <div class="content">
          {{ block "main" . }}
          {{ end }}
        </div>
        {{- partial "footer.html" . -}}
      </main>
    </div>
  </body>
  {{ $navbutton := resources.Get "js/navbutton.js" | minify | fingerprint "sha512" }}
  <script src="{{ $navbutton.RelPermalink }}" integrity="{{ $navbutton.Data.Integrity }}"></script>
</html>
